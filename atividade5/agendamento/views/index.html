<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Consulta</title>
    <!-- Importação do Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5" style="max-width: 800px;">
        <h1 class="text-center mb-5">Agendamento</h1>
        
        <form action="/agendamento" method="POST">
            
            <!-- Dados do paciente -->
            <div class="mb-5">
                <h4 class="border-bottom pb-2 mb-3">Dados do paciente</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" name="nome">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Sobrenome</label>
                        <input type="text" class="form-control" name="sobrenome">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-control" name="cpf">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" name="nascimento">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefone</label>
                        <input type="text" class="form-control" name="telefone">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CEP</label>
                        <input type="text" class="form-control" name="cep">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Endereço</label>
                        <input type="text" class="form-control" name="endereco">
                    </div>
                </div>
            </div>

            <!-- Dados da consulta -->
            <div class="mb-4">
                <h4 class="border-bottom pb-2 mb-3">Dados da consulta</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Clínica</label>
                        <select class="form-select" name="clinica">
                            <option value="">Selecione...</option>
                            <option value="Clínica Central">Clínica Central</option>
                            <option value="Clínica Norte">Clínica Norte</option>
                            <option value="Clínica Sul">Clínica Sul</option>
                            <option value="Clínica Leste">Clinica Leste</option>
                            <option value="Clínica Oeste">Clinica Oeste</option>
                            <option value="Clínica Independente">Clinica Independente</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Especialidade</label>
                        <input type="text" class="form-control" name="especialidade">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data</label>
                        <input type="date" class="form-control" name="data">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Hora</label>
                        <input type="time" class="form-control" name="hora">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observação</label>
                        <textarea class="form-control" name="observacao" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-secondary w-100 py-2 fw-bold">Enviar</button>
        </form>
    </div>

</body>
</html>
